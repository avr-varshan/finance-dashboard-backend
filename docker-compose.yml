version: "3.9"
services:
  app:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_MINUTES: 43200
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head
             && python seed.py
             && uvicorn app.main:app --host 0.0.0.0 --port 8000"